<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --border: #1e293b;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --tab-h: 56px;
      --header-h: 64px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 32px; height: 32px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

    .site-title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d39988;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Tab Bar ── */
    nav {
      height: var(--tab-h);
      display: flex;
      align-items: flex-end;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 18px;
      height: 40px;
      border-radius: 8px 8px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.18s, background 0.18s, border-color 0.18s;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover { color: var(--text); background: #ffffff0a; }

    .tab.active {
      color: var(--text);
      background: var(--bg);
      border-color: var(--border);
      border-bottom-color: var(--bg);
    }

    .tab-icon {
      width: 16px; height: 16px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: 10px;
    }

    .tab:nth-child(1) .tab-icon { background: #0ea5e920; color: #38bdf8; }
    .tab:nth-child(2) .tab-icon { background: #818cf820; color: #818cf8; }
    .tab:nth-child(3) .tab-icon { background: #34d39920; color: #34d399; }

    .tab.active:nth-child(1) .tab-icon { background: #0ea5e930; }
    .tab.active:nth-child(2) .tab-icon { background: #818cf830; }
    .tab.active:nth-child(3) .tab-icon { background: #34d39930; }

    .tab-indicator {
      position: absolute;
      bottom: -1px; left: 16px; right: 16px;
      height: 2px;
      border-radius: 2px 2px 0 0;
      opacity: 0;
      transition: opacity 0.18s;
    }

    .tab.active .tab-indicator { opacity: 1; }
    .tab:nth-child(1) .tab-indicator { background: var(--accent); }
    .tab:nth-child(2) .tab-indicator { background: var(--accent2); }
    .tab:nth-child(3) .tab-indicator { background: #34d399; }

    /* ── Content ── */
    .frame-container {
      height: calc(100vh - var(--header-h) - var(--tab-h));
      position: relative;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    iframe.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Loading overlay ── */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.3s;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <span class="site-title">Dashboard Portal</span>
    <div class="header-rule"></div>
    <div class="status-dot"></div>
  </header>

  <nav id="tabBar">
    <button class="tab active" data-tab="0">
      <span class="tab-icon">⬡</span>
      IHP Lab Equipment
      <span class="tab-indicator"></span>
    </button>
    <button class="tab" data-tab="1">
      <span class="tab-icon">⬡</span>
      FMOM Equipment
      <span class="tab-indicator"></span>
    </button>
    <button class="tab" data-tab="2">
      <span class="tab-icon">⬡</span>
      IHP Project Progress
      <span class="tab-indicator"></span>
    </button>
  </nav>

  <div class="frame-container">
    <div class="loader" id="loader0">
      <div class="spinner"></div>
      <div class="loader-text">Loading IHP Lab Equipment…</div>
    </div>
    <iframe
      id="frame0"
      src="IHP_Dashboard_Loader_V16.html"
      title="IHP Lab Equipment Dashboard"
    ></iframe>

    <div class="loader" id="loader1">
      <div class="spinner"></div>
      <div class="loader-text">Loading FMOM Equipment…</div>
    </div>
    <iframe
      id="frame1"
      src="FMOM_Equipment_Dashboard_Loader_V13.html"
      title="FMOM Equipment Support Dashboard"
    ></iframe>

    <div class="loader" id="loader2">
      <div class="spinner"></div>
      <div class="loader-text">Loading IHP Project Progress…</div>
    </div>
    <iframe
      id="frame2"
      src="IHP_Project_Progress_Dashboard_V1_2.html"
      title="IHP Project Progress Dashboard"
    ></iframe>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const frames = document.querySelectorAll('iframe');
    const loaders = document.querySelectorAll('.loader');
    const loaded = new Set();

    // Show first frame immediately
    frames[0].classList.add('visible');

    frames.forEach((frame, i) => {
      frame.addEventListener('load', () => {
        loaders[i].classList.add('hidden');
        loaded.add(i);
        if (frame.classList.contains('visible')) {
          frame.classList.add('visible');
        }
      });
    });

    tabs.forEach((tab, i) => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        frames.forEach(f => f.classList.remove('visible'));

        tab.classList.add('active');
        frames[i].classList.add('visible');

        if (!loaded.has(i)) {
          loaders[i].classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
